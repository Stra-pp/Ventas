<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMF Travel · Flujo Comercial (Prototipo)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#00545D; --teal-d:#003b41; --teal-l:#0a6b75; --teal-10:#e6eeef; --teal-20:#cfe0e1;
    --ink:#17282a; --muted:#5f7376; --line:#e3e8e7; --bg:#f3f5f3; --card:#ffffff;
    --amber:#e0a458; --amber-10:#fbf1e2; --coral:#d96c4a; --coral-10:#fbe9e3;
    --green:#2f9e6f; --green-10:#e5f4ee; --blue:#3d7bc4; --blue-10:#e8f0f9;
    --radius:14px; --shadow:0 1px 2px rgba(23,40,42,.06),0 6px 18px rgba(23,40,42,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4,.cond{font-family:'Barlow Condensed','Inter',system-ui,sans-serif;letter-spacing:.4px}
  .num{font-family:'Barlow Condensed','Inter',sans-serif;font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer}
  a{color:var(--teal)}

  header.top{background:var(--teal);color:#fff;padding:0 22px;display:flex;align-items:center;gap:18px;height:64px;position:sticky;top:0;z-index:50;box-shadow:0 2px 14px rgba(0,60,66,.18)}
  header.top .logo{height:30px;filter:brightness(0) invert(1);opacity:.96}
  header.top .divider{width:1px;height:30px;background:rgba(255,255,255,.28)}
  header.top .title{font-family:'Barlow Condensed';font-weight:600;font-size:19px;text-transform:uppercase;letter-spacing:1px;line-height:1.05}
  header.top .title small{display:block;font-family:'Inter';font-weight:500;font-size:10.5px;letter-spacing:.6px;text-transform:none;opacity:.8}
  header.top .tz{margin-left:auto;font-size:11.5px;opacity:.85;text-align:right}
  header.top .tz b{font-family:'Barlow Condensed';font-size:14px;letter-spacing:.5px}
  .badge-proto{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);padding:4px 10px;border-radius:20px;font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;font-weight:600}

  nav.tabs{background:#fff;border-bottom:1px solid var(--line);padding:0 16px;display:flex;gap:2px;position:sticky;top:64px;z-index:40;overflow-x:auto}
  nav.tabs button{background:none;border:none;padding:14px 16px 12px;color:var(--muted);font-size:13.5px;font-weight:600;border-bottom:3px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:8px}
  nav.tabs button .ico{font-size:15px}
  nav.tabs button:hover{color:var(--teal)}
  nav.tabs button.active{color:var(--teal);border-bottom-color:var(--teal)}
  nav.tabs .pill{background:var(--teal-10);color:var(--teal);font-size:11px;padding:1px 7px;border-radius:10px;font-weight:700}

  main{max-width:1180px;margin:0 auto;padding:22px 18px 70px}
  .wrap-narrow{max-width:900px;margin:0 auto}
  .sect-title{font-family:'Barlow Condensed';font-size:22px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--teal-d);margin:0 0 3px}
  .sect-sub{color:var(--muted);font-size:13px;margin:0 0 18px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card.pad{padding:18px}
  .card h3{margin:0 0 3px;font-size:17px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--teal-d)}
  .card .sub{color:var(--muted);font-size:12px;margin:0 0 14px}

  .grid{display:grid;gap:16px}
  .g4{grid-template-columns:repeat(4,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g2{grid-template-columns:1fr 1fr}
  @media(max-width:900px){.g4,.g3,.g2{grid-template-columns:1fr 1fr}}
  @media(max-width:620px){.g4,.g3,.g2{grid-template-columns:1fr}}

  .kpi{padding:16px 18px}
  .kpi .lbl{font-size:11.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:600}
  .kpi .val{font-family:'Barlow Condensed';font-size:32px;font-weight:700;line-height:1;margin:6px 0 2px;color:var(--teal-d)}
  .kpi .foot{font-size:11.5px;color:var(--muted)}
  .kpi.accent{border-top:3px solid var(--teal)} .kpi.blue{border-top:3px solid var(--blue)} .kpi.blue .val{color:var(--blue)}
  .kpi.amber{border-top:3px solid var(--amber)} .kpi.amber .val{color:#b57a2e}
  .kpi.green{border-top:3px solid var(--green)} .kpi.green .val{color:var(--green)}

  .flow{background:linear-gradient(105deg,var(--teal),var(--teal-l));color:#fff;border-radius:var(--radius);padding:20px 22px;margin-bottom:20px;box-shadow:var(--shadow)}
  .flow h2{margin:0 0 4px;font-size:21px;font-weight:600;text-transform:uppercase;letter-spacing:.6px}
  .flow p{margin:0 0 16px;font-size:13px;opacity:.92;max-width:820px}
  .flow .steps{display:flex;gap:10px;flex-wrap:wrap;align-items:stretch}
  .flow .st{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:12px;padding:13px 15px;flex:1;min-width:170px;position:relative}
  .flow .st .n{position:absolute;top:-9px;left:13px;background:#fff;color:var(--teal);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed';font-weight:700;font-size:13px}
  .flow .st .who{font-size:10.5px;text-transform:uppercase;letter-spacing:.7px;opacity:.8;font-weight:600;margin-top:6px}
  .flow .st .wt{font-family:'Barlow Condensed';font-size:16px;font-weight:600;margin-top:2px}
  .flow .st .ds{font-size:11.5px;opacity:.9;margin-top:5px;line-height:1.4}
  .flow .st.client{background:#fff;color:var(--teal-d)} .flow .st.client .who{opacity:.7}

  .pipe{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
  @media(max-width:720px){.pipe{grid-template-columns:1fr 1fr}}
  .pipe .p{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;border-left:4px solid var(--line)}
  .pipe .p .st{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:600}
  .pipe .p .c{font-family:'Barlow Condensed';font-size:26px;font-weight:700;color:var(--teal-d)}
  .pipe .p.e1{border-left-color:var(--amber)} .pipe .p.e2{border-left-color:var(--blue)}
  .pipe .p.e3{border-left-color:var(--coral)} .pipe .p.done{border-left-color:var(--green)}

  .fl-layout{display:grid;grid-template-columns:320px 1fr;gap:16px}
  @media(max-width:820px){.fl-layout{grid-template-columns:1fr}}
  .fl-list .item{background:#fff;border:1px solid var(--line);border-radius:11px;padding:12px 13px;margin-bottom:9px;cursor:pointer;transition:.12s}
  .fl-list .item:hover{border-color:var(--teal-20);box-shadow:var(--shadow)}
  .fl-list .item.sel{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-10)}
  .fl-list .item .cod{font-family:'Barlow Condensed';font-weight:700;color:var(--teal);font-size:14px}
  .fl-list .item .nm{font-weight:600;font-size:13.5px;margin:2px 0}
  .fl-list .item .mt{font-size:11.5px;color:var(--muted)}

  .fgroup{margin-bottom:14px}
  .fgroup>label{display:block;font-size:12px;font-weight:600;color:var(--ink);margin-bottom:5px}
  .fgroup .hint{font-weight:400;color:var(--muted);font-size:11px}
  input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:13.5px;color:var(--ink);background:#fff}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-10)}
  input[type=file]{padding:7px;font-size:12px}
  textarea{resize:vertical;min-height:52px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px} .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  @media(max-width:620px){.row2,.row3{grid-template-columns:1fr}}
  fieldset.block{border:1px solid var(--line);border-radius:12px;padding:15px;margin:0 0 14px}
  fieldset.block legend{font-family:'Barlow Condensed';font-weight:600;font-size:13.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--teal);padding:0 8px}

  .btn{background:var(--teal);color:#fff;border:none;padding:11px 18px;border-radius:10px;font-weight:600;font-size:13.5px;letter-spacing:.3px}
  .btn:hover{background:var(--teal-d)}
  .btn.ghost{background:#fff;color:var(--teal);border:1.5px solid var(--teal-20)} .btn.ghost:hover{background:var(--teal-10)}
  .btn.sm{padding:7px 12px;font-size:12.5px}
  .btn.wide{width:100%;padding:13px}
  .btn.tour{background:linear-gradient(100deg,var(--coral),#c85a38);padding:13px 18px}
  .btn.tour:hover{filter:brightness(1.05)}

  .tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
  .tag.ok{background:var(--green-10);color:var(--green)} .tag.warn{background:var(--amber-10);color:#b57a2e}
  .tag.pend{background:var(--coral-10);color:var(--coral)} .tag.teal{background:var(--teal-10);color:var(--teal)}
  .tag.blue{background:var(--blue-10);color:var(--blue)} .tag.gray{background:#eef1f0;color:var(--muted)}

  .stage-hd{display:flex;align-items:center;gap:10px;background:var(--teal-10);border:1px solid var(--teal-20);border-radius:11px;padding:12px 14px;margin-bottom:16px}
  .stage-hd .em{font-size:20px}
  .stage-hd .tt{font-family:'Barlow Condensed';font-weight:600;font-size:16px;color:var(--teal-d)}
  .stage-hd .ds{font-size:12px;color:var(--muted)}

  .summary{background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin-bottom:16px}
  .summary .r{display:flex;justify-content:space-between;gap:12px;padding:5px 0;border-bottom:1px dotted var(--line);font-size:13px}
  .summary .r:last-child{border:none}
  .summary .r .l{color:var(--muted)} .summary .r .v{font-weight:600;text-align:right}

  .sigwrap{border:1px solid var(--line);border-radius:11px;padding:14px;background:#fff}
  .sigcanvas{width:100%;height:150px;border:1.5px dashed var(--teal-20);border-radius:9px;background:#fcfdfd;touch-action:none;cursor:crosshair;display:block}
  .sig-hint{font-size:11.5px;color:var(--muted);margin-top:7px;display:flex;justify-content:space-between;align-items:center}
  .checkline{display:flex;align-items:center;gap:10px;background:var(--green-10);border:1px solid #bfe6d3;border-radius:10px;padding:11px 13px;font-size:13px;margin:14px 0}
  .checkline input{width:auto}

  .tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
  table{border-collapse:collapse;width:100%;font-size:12.5px;background:#fff;min-width:820px}
  th{background:var(--teal);color:#fff;text-align:left;padding:9px 11px;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
  td{padding:9px 11px;border-top:1px solid var(--line);vertical-align:middle}
  tr:nth-child(even) td{background:#fafbfa}
  .slot-hdr td{background:var(--teal-d)!important;color:#fff;font-family:'Barlow Condensed';font-weight:600;font-size:14px;letter-spacing:.5px}
  .empty-slot td{color:#aab6b5;font-style:italic;background:#fff!important}
  .row-total td{background:var(--teal-10)!important;font-weight:700;color:var(--teal-d)}

  .callout{background:var(--amber-10);border:1px solid #eed3aa;border-radius:11px;padding:13px 15px;font-size:12.5px;color:#7a561f;display:flex;gap:10px}
  .callout.teal{background:var(--teal-10);border-color:var(--teal-20);color:var(--teal-d)}
  .callout.blue{background:var(--blue-10);border-color:#bcd4ef;color:#2b4f78}
  .callout .ic{font-size:17px;flex-shrink:0}
  .mini-note{font-size:11.5px;color:var(--muted);margin-top:8px}
  .selrow{display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin-bottom:16px}
  .selrow .fgroup{margin:0}

  /* ===== OVERLAY / PANTALLAS ===== */
  .scrim{position:fixed;inset:0;background:rgba(8,22,24,.6);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:22px 12px;overflow-y:auto}
  .rolebar{position:sticky;top:0;width:100%;max-width:660px;margin:0 auto 12px;display:flex;align-items:center;gap:10px;color:#fff;font-size:12.5px;z-index:2}
  .rolebar .who{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);border-radius:20px;padding:6px 13px;font-weight:600;display:flex;align-items:center;gap:7px}
  .rolebar .x{margin-left:auto;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);color:#fff;width:34px;height:34px;border-radius:50%;font-size:16px}
  .rolebar .x:hover{background:rgba(255,255,255,.28)}

  .phone{width:392px;max-width:100%;background:#0c1a1c;border-radius:40px;padding:11px;box-shadow:0 30px 90px rgba(0,0,0,.55)}
  .phone .glass{background:#fff;border-radius:30px;overflow:hidden;max-height:80vh;overflow-y:auto}
  .phone .notch{background:var(--teal);height:34px;display:flex;align-items:center;justify-content:center;position:relative}
  .phone .notch::before{content:'';width:64px;height:15px;background:#0c1a1c;border-radius:0 0 12px 12px;position:absolute;top:0}
  .phone .appbar{background:var(--teal);color:#fff;padding:6px 18px 14px;display:flex;align-items:center;gap:10px}
  .phone .appbar img{height:20px;filter:brightness(0) invert(1)}
  .phone .appbar .t{font-family:'Barlow Condensed';font-weight:600;font-size:14px;letter-spacing:.5px;text-transform:uppercase}
  .phone .body{padding:18px 18px 22px}

  .deskwin{width:660px;max-width:100%;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 30px 90px rgba(0,0,0,.5);max-height:82vh;display:flex;flex-direction:column}
  .deskwin .bar{background:var(--teal-d);color:#fff;padding:12px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0}
  .deskwin .bar .t{font-family:'Barlow Condensed';font-weight:600;font-size:16px;letter-spacing:.5px;text-transform:uppercase}
  .deskwin .bar .dots{display:flex;gap:6px;margin-right:6px}
  .deskwin .bar .dots i{width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,.4);display:block}
  .deskwin .content{padding:20px;overflow-y:auto}

  .linkbox{background:var(--teal-d);color:#fff;border-radius:11px;padding:13px 15px;margin-bottom:14px}
  .linkbox .l{font-size:11px;text-transform:uppercase;letter-spacing:.6px;opacity:.75;font-weight:600}
  .linkbox .u{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:8px 10px;margin:7px 0 10px;word-break:break-all}
  .linkbox .row{display:flex;gap:8px;flex-wrap:wrap}
  .linkbox .btn{background:#fff;color:var(--teal-d)} .linkbox .btn:hover{background:#e9f1f1}

  .waiver{background:#fff;border:1px solid var(--line);border-radius:12px;padding:28px 32px;box-shadow:var(--shadow);font-size:13px;line-height:1.55}
  .waiver .wh{text-align:center;border-bottom:2px solid var(--teal);padding-bottom:14px;margin-bottom:18px}
  .waiver .wh .co{font-family:'Barlow Condensed';font-size:22px;font-weight:700;color:var(--teal-d)}
  .waiver .wh .doc{font-size:12px;color:var(--muted);margin-top:3px}
  .waiver .wsec{margin-bottom:15px}
  .waiver .wt{font-family:'Barlow Condensed';font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--teal);border-left:3px solid var(--teal);padding-left:9px;margin-bottom:8px}
  .waiver .wfields{display:grid;grid-template-columns:1fr 1fr;gap:5px 26px}
  .waiver .wf{display:flex;justify-content:space-between;gap:10px;border-bottom:1px dotted var(--line);padding:4px 0;font-size:12.5px}
  .waiver .wf .l{color:var(--muted)} .waiver .wf .v{font-weight:600;text-align:right}
  .waiver .legal{font-size:11px;color:var(--muted);background:var(--bg);border-radius:9px;padding:11px 13px;line-height:1.5}
  .waiver .sign{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
  .waiver .sign .box{border-top:1.5px solid var(--ink);padding-top:6px;font-size:11.5px;color:var(--muted)}
  .sign-stamp{border:2px dashed var(--green);color:var(--green);border-radius:10px;padding:8px 13px;display:inline-flex;align-items:center;gap:9px;font-weight:600;font-size:12.5px;background:var(--green-10)}
  .sig-img{max-height:70px;border-bottom:1.5px solid var(--ink)}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(140px);background:var(--teal-d);color:#fff;padding:14px 18px;border-radius:12px;box-shadow:0 10px 40px rgba(0,40,44,.35);z-index:200;max-width:540px;transition:transform .35s cubic-bezier(.2,.8,.2,1);border:1px solid rgba(255,255,255,.15)}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast .hd{font-family:'Barlow Condensed';font-size:16px;font-weight:600;margin-bottom:7px}
  .toast .lines{display:flex;flex-direction:column;gap:5px;font-size:12.5px}
  .toast .lines span{display:flex;gap:8px} .toast .ck{color:#7fe0b0}

  .tourbanner{background:var(--coral-10);border:1px solid #eec4b4;border-radius:10px;padding:8px 12px;font-size:11.5px;color:#9a4326;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
  .cal-nav .mtitle{font-family:'Barlow Condensed';font-size:20px;font-weight:600;color:var(--teal-d);min-width:160px;text-align:center}
  .cal-nav button.navb{background:#fff;border:1px solid var(--line);border-radius:9px;width:38px;height:38px;font-size:16px;color:var(--teal)}
  .cal-nav button.navb:hover{background:var(--teal-10)}
  .cal-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-left:auto}
  .cal-legend .lg{display:flex;align-items:center;gap:6px}
  .cal-legend .sw{width:12px;height:12px;border-radius:3px}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal-dow{text-align:center;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;padding:4px 0}
  .cal-cell{background:#fff;border:1px solid var(--line);border-radius:9px;min-height:96px;padding:6px;cursor:pointer;overflow:hidden}
  .cal-cell.empty{background:transparent;border:none;cursor:default}
  .cal-cell:hover{border-color:var(--teal-20)}
  .cal-cell.today{border-color:var(--teal);box-shadow:0 0 0 2px var(--teal-10)}
  .cal-cell.sel{background:var(--teal-10);border-color:var(--teal)}
  .cal-cell .dn{font-family:'Barlow Condensed';font-weight:700;font-size:14px;color:var(--teal-d);margin-bottom:3px}
  .chip{font-size:9.5px;border-radius:5px;padding:2px 5px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;line-height:1.35}
  .chip.flight{background:var(--blue-10);color:var(--blue)}
  .chip.zip{background:var(--teal-10);color:var(--teal)}
  .chip.more{background:#eef1f0;color:var(--muted)}
  .agday{margin-top:20px}
  .agday .ev{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-left:4px solid var(--line);border-radius:10px;padding:11px 14px;margin-bottom:8px}
  .agday .ev.flight{border-left-color:var(--blue)} .agday .ev.zip{border-left-color:var(--teal)}
  .agday .ev .tm{font-family:'Barlow Condensed';font-weight:700;font-size:15px;color:var(--teal-d);min-width:72px}
  .agday .ev .info{flex:1} .agday .ev .info .nm{font-weight:600;font-size:13.5px}
  .agday .ev .info .mt{font-size:11.5px;color:var(--muted)}
  @media(max-width:640px){.cal-cell{min-height:62px}.chip{font-size:8px;padding:1px 3px}.cal-cell .dn{font-size:12px}.cal{gap:3px}}
  footer.ft{text-align:center;color:var(--muted);font-size:11.5px;padding:26px 10px 10px}
</style>
</head>

const $=s=>document.querySelector(s);
const money=n=>'$'+(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function fmtDate(d){if(!d)return '—';const[y,m,day]=d.split('-');const M=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];return `${day} ${M[+m-1]} ${y}`;}
function nextCode(){let mx=0;state.reservas.forEach(r=>{if((r.codigo||'').startsWith('AMF-')){const n=+r.codigo.split('-').pop();if(n>mx)mx=n;}});return 'AMF-2026-'+String(mx+1).padStart(4,'0');}
function nextZip(d){const mmdd=d.slice(5).replace('-','');let n=state.reservas.filter(r=>r.canal==='zipline'&&r.fecha===d).length;return 'ZIP-'+mmdd+'-'+String(n+1).padStart(2,'0');}

/* ===================== RENDER ===================== */
function renderTabs(){
  const c={flights:state.reservas.filter(r=>r.canal==='flights').length, zipline:state.reservas.filter(r=>r.canal==='zipline').length};
  $('#tabs').innerHTML=TABS.map(t=>{
    const pill=c[t.id]!=null?`<span class="pill">${c[t.id]}</span>`:'';
    return `<button class="${state.view===t.id?'active':''}" onclick="go('${t.id}')"><span class="ico">${t.ico}</span>${t.label}${pill}</button>`;
  }).join('');
}
function go(v){state.view=v;render();window.scrollTo({top:0,behavior:'smooth'});}
function render(){
  renderTabs();
  const v=state.view;
  $('#app').innerHTML = v==='flights'?viewFlights(): v==='zipline'?viewZipline(): v==='agenda'?viewAgenda(): v==='waiver'?viewWaiver(): viewDash();
  $('#screen').innerHTML = state.screen?renderScreen():'';
  document.body.style.overflow = state.screen?'hidden':'';
  if(state.screen && state.screen.kind==='link2') initSignaturePad();
}

/* ---- AMF FLIGHTS ---- */
function viewFlights(){
  const fl=state.reservas.filter(r=>r.canal==='flights');
  const cnt=e=>fl.filter(r=>r.estado===e).length;
  const pipe=`
  <div class="pipe">
    <div class="p e1"><div class="st">1 · Falta info vuelo</div><div class="c">${cnt('agente')}</div></div>
    <div class="p e3"><div class="st">2 · Espera firma cliente</div><div class="c">${cnt('firma')}</div></div>
    <div class="p e2"><div class="st">3 · Falta confirmar pago</div><div class="c">${cnt('pago')}</div></div>
    <div class="p done"><div class="st">4 · Completado</div><div class="c">${cnt('completado')}</div></div>
  </div>`;
  const list=fl.map(r=>{
    const e=EST[r.estado];
    return `<div class="item ${state.flSel===r.codigo?'sel':''}" onclick="selFl('${r.codigo}')">
      <div class="cod">${r.codigo}</div><div class="nm">${esc(r.nombre)}</div>
      <div class="mt">${r.subtipo?SUBT[r.subtipo].em+' '+SUBT[r.subtipo].l:'✈️ Por definir'} · ${fmtDate(r.fechaSolic)}</div>
      <div style="margin-top:6px"><span class="tag ${e.cls}">${e.l}</span></div>
    </div>`;
  }).join('');
  let panel;
  if(!state.flSel) panel=`<div class="card pad" style="text-align:center;color:var(--muted);padding:44px 18px">Selecciona una reserva de la lista, crea una nueva, o inicia el <b>recorrido guiado</b> para ver todas las pantallas.</div>`;
  else { const r=fl.find(x=>x.codigo===state.flSel); panel=r?panelDetalle(r):''; }
  return `
  <div class="sect-title">AMF Flights — pipeline comercial</div>
  <p class="sect-sub">Cada acción abre la pantalla real del actor: el móvil del cliente o la estación del agente.</p>
  ${pipe}
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
    <button class="btn tour" onclick="startTour()">▶ Recorrido guiado — abre todas las pantallas</button>
    <button class="btn ghost" onclick="openScreen({kind:'link1',tour:false})">➕ Nueva reserva (link del cliente)</button>
  </div>
  <div class="fl-layout">
    <div class="fl-list">${list||'<div class="mini-note">Sin reservas.</div>'}</div>
    <div>${panel}</div>
  </div>`;
}

        <div class="r"><span class="l">Ruta</span><span class="v">${esc(r.pickup)} → ${esc(r.destino)}</span></div>
        <div class="r"><span class="l">Total</span><span class="v">${money(r.precio+r.adicional+r.crossMonto)}</span></div>
      </div>
      <button class="btn wide" onclick="openScreen({kind:'link2',codigo:'${r.codigo}',tour:false})">📱 Abrir link del cliente (solo firma T&C)</button>
    </div>`;
  if(r.estado==='pago') return `
    <div class="card pad">
      <div class="stage-hd" style="background:var(--blue-10);border-color:#bcd4ef"><span class="em">💳</span><div><div class="tt" style="color:var(--blue)">Etapa 3 · Falta confirmar el pago</div><div class="ds">${r.codigo} · el cliente ya firmó. El agente confirma y adjunta el comprobante.</div></div></div>
      <div class="summary">

        <div class="r"><span class="l">Servicio / ruta</span><span class="v">${SUBT[r.subtipo].em} ${esc(r.pickup)} → ${esc(r.destino)}</span></div>
        <div class="r"><span class="l">Firma</span><span class="v"><span class="tag ok">✓ Firmado</span></span></div>
        <div class="r"><span class="l">Total</span><span class="v">${money(r.precio+r.adicional+r.crossMonto)}</span></div>
      </div>
      <button class="btn wide" onclick="openScreen({kind:'pago',codigo:'${r.codigo}',tour:false})">🖥️ Confirmar pago y adjuntar comprobante</button>
    </div>`;
  return `
    <div class="card pad">
      <div class="stage-hd" style="background:var(--green-10);border-color:#bfe6d3"><span class="em">✅</span><div><div class="tt" style="color:var(--green)">Etapa 4 · Completada</div><div class="ds">${r.codigo} · evidencia guardada.</div></div></div>
      <div class="summary">
        <div class="r"><span class="l">Pasajero</span><span class="v">${esc(r.nombre)}</span></div>
        <div class="r"><span class="l">Servicio / ruta</span><span class="v">${SUBT[r.subtipo].em} ${esc(r.pickup)} → ${esc(r.destino)}</span></div>
        <div class="r"><span class="l">Total</span><span class="v">${money(r.precio+r.adicional+r.crossMonto)}</span></div>
        <div class="r"><span class="l">Pago</span><span class="v"><span class="tag ok">Confirmado</span> · 📎 ${esc(r.comprobante||'—')}</span></div>
      </div>
      <button class="btn ghost" onclick="state.waiverSel='${r.codigo}';go('waiver')">📄 Ver waiver firmado</button>
    </div>`;
}

function startTour(){openScreen({kind:'link1',tour:true});}

function renderScreen(){
  const s=state.screen; if(!s) return '';
  if(s.kind==='link1') return scrLink1(s);
  if(s.kind==='agent') return scrAgent(s);
  if(s.kind==='link2') return scrLink2(s);
  if(s.kind==='gracias') return scrGracias(s);
  if(s.kind==='pago') return scrPago(s);
  if(s.kind==='done') return scrDone(s);
  if(s.kind==='zip')  return scrZip(s);
  return '';
}

let _sig={ctx:null,drawing:false,last:null,dirty:false,cv:null};
function initSignaturePad(){
  const cv=document.getElementById('sigPad'); if(!cv) return;
  const ctx=cv.getContext('2d'); ctx.lineWidth=2.4; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#17282a';
  _sig={ctx,drawing:false,last:null,dirty:false,cv};
  const pos=e=>{const r=cv.getBoundingClientRect();const p=(e.touches&&e.touches[0])?e.touches[0]:e;return{x:(p.clientX-r.left)*(cv.width/r.width),y:(p.clientY-r.top)*(cv.height/r.height)};};
  const start=e=>{_sig.drawing=true;_sig.last=pos(e);e.preventDefault();};
  const move=e=>{if(!_sig.drawing)return;const p=pos(e);ctx.beginPath();ctx.moveTo(_sig.last.x,_sig.last.y);ctx.lineTo(p.x,p.y);ctx.stroke();_sig.last=p;_sig.dirty=true;e.preventDefault();};
  const end=()=>{_sig.drawing=false;};
  cv.onmousedown=start; cv.onmousemove=move; window.addEventListener('mouseup',end);
  cv.ontouchstart=start; cv.ontouchmove=move; cv.ontouchend=end;
}
function sigClear(){if(_sig.cv&&_sig.ctx){_sig.ctx.clearRect(0,0,_sig.cv.width,_sig.cv.height);_sig.dirty=false;}}
function sigData(){return (_sig.cv&&_sig.dirty)?_sig.cv.toDataURL('image/png'):null;}

  const dayTotal=rows.reduce((a,r)=>a+r.precio,0);
  const COLS=10; let body='';
  slots.forEach(slot=>{

          <div class="row3">
            <div class="fgroup"><label>Teléfono / WhatsApp</label><input id="z_tel"></div>
            <div class="fgroup"><label>Correo</label><input id="z_email"></div>
            <div class="fgroup"><label>Peso corporal</label><input id="z_peso" placeholder="Ej. 72 kg"></div>
          </div>
          <div class="row2">
            <div class="fgroup"><label>Idioma</label><select id="z_idioma"><option>Inglés</option><option>Español</option><option>Francés</option><option>Otro</option></select></div>
            <div class="fgroup"><label>Pickup / punto de encuentro</label><input id="z_pickup"></div>
          </div>
        </fieldset>
        <fieldset class="block"><legend>Pago y estado</legend>
          <div class="row3">
            <div class="fgroup"><label>Precio (US$)</label><input id="z_precio" type="number" step="0.01" value="45"></div>
            <div class="fgroup"><label>Método de pago</label><select id="z_pmet"><option>Efectivo</option><option>Wompi - Tarjeta</option><option>Transferencia</option><option>Yappy</option></select></div>
            <div class="fgroup"><label>Estado de pago</label><select id="z_pest"><option>Confirmado</option><option>Pendiente</option></select></div>
          </div>
          <div class="row2">
            <div class="fgroup"><label>Estado de la reserva</label><select id="z_estres"><option>Confirmada</option><option>Pendiente</option><option>Completada</option></select></div>
            <div class="fgroup" style="display:flex;align-items:end"><label style="display:flex;gap:8px;align-items:center;font-weight:500"><input type="checkbox" id="z_waiver" style="width:auto" checked> Cliente aceptó T&amp;C (exoneración exprés)</label></div>
          </div>
          <div class="fgroup"><label>Comentarios</label><textarea id="z_coment" placeholder="Notas operativas, alergias, cumpleaños, etc."></textarea></div>
        </fieldset>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button class="btn ghost" onclick="closeScreen()">Cancelar</button>
          <button class="btn" onclick="guardarZip()">Guardar reserva</button>
        </div>
      </div>
    </div></div>`;
}
function guardarZip(){
  const d=gv('z_fecha')||HOY;
  const r={canal:'zipline',subtipo:gv('z_sub')||'zipline',codigo:nextZip(d),fecha:d,hora:gv('z_hora')||'8:00 AM',
    nombre:gv('z_nombre')||'Sin nombre',tel:gv('z_tel')||'—',email:gv('z_email')||'—',peso:gv('z_peso')||'—',idioma:gv('z_idioma')||'Inglés',
    pickup:gv('z_pickup')||'—',precio:+gv('z_precio')||0,pagoMetodo:gv('z_pmet')||'Efectivo',pagoEstado:gv('z_pest')||'Pendiente',
    guia:gv('z_guia')||'—',waiverExpress:!!gv('z_waiver'),estadoRes:gv('z_estres')||'Pendiente',coment:gv('z_coment')||''};
  state.reservas.push(r); state.ziplineDate=d;
  toast(`✅ ${r.codigo} registrada`,['<span class="ck">✓</span> Reserva Zipline guardada en la app','<span class="ck">✓</span> Visible en la matriz diaria y el dashboard']);
  closeScreen();
}

/* ---- CALENDARIO ---- */
function parseTime(t){if(!t)return 9999;const m=String(t).match(/(\d+):(\d+)\s*(AM|PM)?/i);if(!m)return 9999;let h=+m[1],mn=+m[2];const ap=(m[3]||'').toUpperCase();if(ap==='PM'&&h<12)h+=12;if(ap==='AM'&&h===12)h=0;return h*60+mn;}
function shiftMonth(ym,delta){let[y,m]=ym.split('-').map(Number);m+=delta;while(m<1){m+=12;y--;}while(m>12){m-=12;y++;}return y+'-'+String(m).padStart(2,'0');}
function eventsOn(ds){const evs=[];state.reservas.forEach(r=>{if(r.canal==='flights'){if(r.fecha===ds&&r.subtipo)evs.push({t:r.hora,type:'flight',sub:r.subtipo,name:r.nombre,cod:r.codigo,estado:(EST[r.estado]||{}).l||r.estado});}else if(r.canal==='zipline'){if(r.fecha===ds)evs.push({t:r.hora,type:'zip',sub:r.subtipo,name:r.nombre,cod:r.codigo,estado:r.estadoRes||''});}});evs.sort((a,b)=>parseTime(a.t)-parseTime(b.t));return evs;}
function viewAgenda(){
  const ym=state.calMonth; const Y=+ym.split('-')[0], M=+ym.split('-')[1];
  const MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const first=new Date(Y,M-1,1).getDay(); const dim=new Date(Y,M,0).getDate();
  const dow=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  let cells=dow.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<first;i++) cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${Y}-${String(M).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evs=eventsOn(ds);
    const chips=evs.slice(0,3).map(e=>`<div class="chip ${e.type}">${esc(e.t||'')} ${SUBT[e.sub].em} ${esc((e.name||'').split(' ')[0])}</div>`).join('');
    const more=evs.length>3?`<div class="chip more">+${evs.length-3} más</div>`:'';
    cells+=`<div class="cal-cell ${ds===HOY?'today':''} ${ds===state.calDay?'sel':''}" onclick="state.calDay='${ds}';render()"><div class="dn">${d}</div>${chips}${more}</div>`;
  }
  const sel=state.calDay; const selEv=eventsOn(sel);
  const agenda = selEv.length
    ? selEv.map(e=>`<div class="ev ${e.type}"><div class="tm">${esc(e.t||'—')}</div><div class="info"><div class="nm">${SUBT[e.sub].em} ${esc(e.name)}</div><div class="mt">${SUBT[e.sub].l} · ${esc(e.cod)} · ${esc(e.estado||'')}</div></div><button class="btn sm ghost" onclick="${e.type==='flight'?`selFl('${e.cod}');go('flights')`:`go('zipline')`}">Ver</button></div>`).join('')
    : `<div class="mini-note">Sin servicios agendados este día.</div>`;
  return `
  <div class="sect-title">Calendario de servicios</div>
  <p class="sect-sub">Cada vuelo y cada zipline agendado aparece aquí automáticamente.</p>
  <div class="cal-nav">
    <button class="navb" onclick="state.calMonth=shiftMonth(state.calMonth,-1);render()">‹</button>
    <div class="mtitle">${MN[M-1]} ${Y}</div>
    <button class="navb" onclick="state.calMonth=shiftMonth(state.calMonth,1);render()">›</button>
    <div class="cal-legend"><span class="lg"><span class="sw" style="background:var(--blue)"></span> Vuelo</span><span class="lg"><span class="sw" style="background:var(--teal)"></span> Zipline / Tour</span></div>
  </div>
  <div class="cal">${cells}</div>
  <div class="agday"><h3 style="font-family:'Barlow Condensed';font-size:17px;color:var(--teal-d);margin:0 0 10px">Agenda · ${fmtDate(sel)}</h3>${agenda}</div>`;
}

/* ---- WAIVER ---- */
function viewWaiver(){
  const done=state.reservas.filter(r=>r.canal==='flights');
  if(!done.length) return `<div class="card pad">Sin reservas de Flights.</div>`;
  const sel=state.waiverSel||done[done.length-1].codigo;
  const r=done.find(x=>x.codigo===sel)||done[done.length-1];
  const st=r.subtipo?SUBT[r.subtipo]:{l:'Por definir',em:'✈️'};
  const firma = r.firmaImg ? `<img class="sig-img" src="${r.firmaImg}">`
    : r.waiverAcept ? `<span class="sign-stamp">✓ Firmado electrónicamente · ${fmtDate(r.fecha||HOY)}</span>`
    : `<span class="tag pend">⚠ Pendiente de firma</span>`;
  return `
  <div class="sect-title">Waiver generado</div>
  <p class="sect-sub">El mismo registro produce el formulario legal de AMF Travel — con la firma del link 2 embebida.</p>
  <div class="selrow"><div class="fgroup"><label>Ver waiver de</label>
    <select onchange="state.waiverSel=this.value;render()">${done.map(x=>`<option value="${x.codigo}" ${x.codigo===sel?'selected':''}>${x.codigo} · ${esc(x.nombre)}</option>`).join('')}</select></div>
    <button class="btn sm ghost" onclick="alert('En producción: genera el PDF con la firma incrustada (Codigo_v3.gs), lo guarda en Drive y lo envía al cliente.')">⬇ Descargar PDF</button></div>
  <div class="waiver wrap-narrow">
    <div class="wh"><div class="co">AMF TRAVEL &amp; HOSPITALITY INC.</div><div class="doc">Formulario de Información del Cliente · Aceptación de Términos y Condiciones</div></div>
    <div class="wsec"><div class="wt">Uso interno / reserva</div><div class="wfields">
      <div class="wf"><span class="l">Código</span><span class="v">${esc(r.codigo)}</span></div>
      <div class="wf"><span class="l">Asesor</span><span class="v">${esc(r.asesor||'—')}</span></div>
      <div class="wf"><span class="l">Servicio</span><span class="v">${st.em} ${st.l}</span></div>
      <div class="wf"><span class="l">Fecha servicio</span><span class="v">${fmtDate(r.fecha)}</span></div>
    </div></div>
    <div class="wsec"><div class="wt">Datos del cliente</div><div class="wfields">
      <div class="wf"><span class="l">Nombre</span><span class="v">${esc(r.nombre)}</span></div>
      <div class="wf"><span class="l">Nacionalidad</span><span class="v">${esc(r.nac)}</span></div>
      <div class="wf"><span class="l">Documento</span><span class="v">${esc(r.docTipo)} ${esc(r.docNum)}</span></div>
      <div class="wf"><span class="l">Correo</span><span class="v">${esc(r.email)}</span></div>
      <div class="wf"><span class="l">Teléfono</span><span class="v">${esc(r.tel)}</span></div>
      <div class="wf"><span class="l">Dirección</span><span class="v">${esc(r.direccion)}</span></div>
    </div></div>
    <div class="wsec"><div class="wt">Servicio / vuelo</div><div class="wfields">
      <div class="wf"><span class="l">Ruta</span><span class="v">${esc(r.pickup||'—')} → ${esc(r.destino||'—')}</span></div>
      <div class="wf"><span class="l">Hora</span><span class="v">${esc(r.hora||'—')}</span></div>
      <div class="wf"><span class="l">Participantes</span><span class="v">${r.pax||'—'}</span></div>
      <div class="wf"><span class="l">Proveedor</span><span class="v">${esc(r.proveedor||'—')}</span></div>
    </div></div>
    <div class="wsec"><div class="wt">Aceptación de términos y condiciones</div>
      <div class="legal">EL CLIENTE declara que leyó y acepta los Términos y Condiciones Generales de AMF Travel &amp; Hospitality Inc., reconoce que AMF Travel actúa como intermediario/coordinador, que la ejecución puede corresponder a proveedores externos y que sus pólizas no se extienden automáticamente a dichos servicios. Regido por las leyes de Panamá.</div>
    </div>
    <div class="sign">
      <div class="box">Firma del cliente<br><div style="margin-top:8px">${firma}</div></div>
      <div class="box">Comprobante de pago<br><div style="margin-top:8px">${r.pagoConf?`<span class="tag ok">✓ Pago confirmado</span> · 📎 ${esc(r.comprobante||'—')}`:'<span class="tag pend">Pendiente</span>'}</div></div>
    </div>
  </div>`;
}

/* ---- DASHBOARD ---- */
function viewDash(){
  const R=state.reservas, fl=R.filter(r=>r.canal==='flights'), zp=R.filter(r=>r.canal==='zipline');
  const totFl=fl.reduce((a,r)=>a+(r.precio||0)+(r.adicional||0)+(r.crossMonto||0),0);
  const totZp=zp.reduce((a,r)=>a+(r.precio||0),0); const total=totFl+totZp;
  const firmados=fl.filter(r=>r.waiverAcept).length;
  const enProceso=fl.filter(r=>r.estado!=='completado').length;
  const maxb=Math.max(totFl,totZp,1);
  const bar=(l,v,c)=>`<div style="display:grid;grid-template-columns:130px 1fr 60px;align-items:center;gap:10px;font-size:12.5px"><span>${l}</span><div style="background:var(--bg);border:1px solid var(--line);border-radius:8px;height:22px;overflow:hidden"><div style="height:100%;width:${Math.max(v/maxb*100,6)}%;background:${c};border-radius:8px 0 0 8px;display:flex;align-items:center;justify-content:flex-end;padding-right:7px;color:#fff;font-size:10.5px;font-weight:700">${money(v)}</div></div><span class="num" style="text-align:right">${Math.round(v/total*100)||0}%</span></div>`;
  return `
  <div class="sect-title">Dashboard gerencia</div>
  <p class="sect-sub">Una sola fuente alimenta esta vista, el waiver y la matriz de finanzas.</p>
  <div class="grid g4" style="margin-bottom:18px">
    <div class="card kpi accent"><div class="lbl">Ingreso total</div><div class="val num">${money(total)}</div><div class="foot">${R.length} registros</div></div>
    <div class="card kpi blue"><div class="lbl">Waivers firmados</div><div class="val num">${firmados}/${fl.length}</div><div class="foot">AMF Flights</div></div>
    <div class="card kpi amber"><div class="lbl">Flights en proceso</div><div class="val num">${enProceso}</div><div class="foot">Etapas 1–3</div></div>
    <div class="card kpi green"><div class="lbl">Zipline / Tours</div><div class="val num">${money(totZp)}</div><div class="foot">${zp.length} pasajeros</div></div>
  </div>
  <div class="grid g2">
    <div class="card pad"><h3>Ingreso por línea</h3><p class="sub">Flights vs Zipline/Tours</p>
      <div style="display:flex;flex-direction:column;gap:11px">${bar('✈️ AMF Flights',totFl,'var(--blue)')}${bar('🪢 Zipline/Tours',totZp,'var(--teal)')}</div></div>
    <div class="card pad"><h3>Últimos registros</h3><p class="sub">Trazabilidad</p>
      <div class="tbl-wrap"><table style="min-width:0">
        <thead><tr><th>Código</th><th>Cliente</th><th>Estado</th><th>Monto</th></tr></thead>
        <tbody>${R.slice().reverse().slice(0,7).map(r=>{
          const lbl={agente:'En agente',firma:'Espera firma',pago:'Falta pago',completado:'Completado'}[r.estado]||r.estado;
          const est=r.canal==='flights'?`<span class="tag ${(EST[r.estado]||{}).cls||'gray'}">${lbl}</span>`:(r.pagoEstado==='Confirmado'?'<span class="tag ok">Confirmado</span>':'<span class="tag pend">Pendiente</span>');
          return `<tr><td class="num" style="font-weight:700;color:var(--teal)">${esc(r.codigo)}</td><td>${esc(r.nombre)}</td><td>${est}</td><td class="num">${money((r.precio||0)+(r.adicional||0)+(r.crossMonto||0))}</td></tr>`;
        }).join('')}</tbody></table></div></div>
  </div>`;
}

/* ---- TOAST + CLOCK ---- */
function toast(hd,lines){const t=$('#toast');t.innerHTML=`<div class="hd">${hd}</div><div class="lines">${lines.map(l=>`<span>${l}</span>`).join('')}</div>`;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),4200);}
function tick(){try{$('#clock').textContent=new Date().toLocaleTimeString('es-PA',{hour:'2-digit',minute:'2-digit',timeZone:'America/Panama',hour12:false});}catch(e){$('#clock').textContent='--:--';}}
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&state.screen)closeScreen();});
tick(); setInterval(tick,15000);
render();
</script>
